<header class="site-header">
    <div class="header-content">
        <a href="/" class="site-title">
            <span class="brand-mark" aria-hidden="true"><img src="/assets/favicon/apple-touch-icon.png" class="brand-mark__favicon" alt="" width="28" height="28"></span>
            <span class="brand-theme-emoji" aria-hidden="true" hidden></span>
            <span class="brand-name">Daily Pick</span>
        </a>
        <div class="header-collapse" id="header-collapse">
            <nav aria-label="Main navigation">
                <a href="/">Play</a>
                <a href="/blog/">Blog</a>
                <a href="/apps/roster/" data-show-only="standup">Roster</a>
                <a href="/apps/brand/">Brand</a>
            </nav>
            <div class="search-container" id="search-container">
                <input type="text" id="search-input" class="search-input" placeholder="Search games..." aria-label="Search games and settings">
                <div id="search-results"></div>
            </div>
            <div class="branding-controls">
                <div class="weather" id="site-weather" aria-label="Current weather" title="Current weather">
                    ⛅ …
                </div>
                <a class="standup-only-link" href="/apps/roster/" data-show-only="standup">Roster & Branding →</a>
            </div>
        </div>
        <button class="nav-toggle" id="nav-toggle" aria-expanded="false" aria-controls="header-collapse" aria-label="Open navigation menu">
            <span class="nav-toggle__bar" aria-hidden="true"></span>
            <span class="nav-toggle__bar" aria-hidden="true"></span>
            <span class="nav-toggle__bar" aria-hidden="true"></span>
        </button>
    </div>
</header>
<script src="/assets/js/weather.js" defer></script>
<link href="/assets/css/search.css" rel="stylesheet">
<script src="/assets/js/search.js" defer></script>
<script>
  document.addEventListener('DOMContentLoaded', function() {
    // Hide standup-only features on non-standup pages
    const mainEl = document.querySelector('main');
    const isStandupPage = mainEl && mainEl.hasAttribute('data-page-type') && mainEl.getAttribute('data-page-type') === 'standup';
    const standupLinks = document.querySelectorAll('[data-show-only="standup"]');
    standupLinks.forEach(link => {
      link.style.display = isStandupPage ? 'inline' : 'none';
    });

    // Mobile nav toggle
    const navToggle = document.getElementById('nav-toggle');
    const headerCollapse = document.getElementById('header-collapse');

    if (navToggle && headerCollapse) {
      function openMenu() {
        navToggle.setAttribute('aria-expanded', 'true');
        headerCollapse.classList.add('nav-open');
      }
      function closeMenu() {
        navToggle.setAttribute('aria-expanded', 'false');
        headerCollapse.classList.remove('nav-open');
      }

      navToggle.addEventListener('click', function() {
        navToggle.getAttribute('aria-expanded') === 'true' ? closeMenu() : openMenu();
      });

      // Close when clicking outside the header
      document.addEventListener('click', function(e) {
        if (!e.target.closest('.site-header') && headerCollapse.classList.contains('nav-open')) {
          closeMenu();
        }
      });

      // Close on Escape key
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && headerCollapse.classList.contains('nav-open')) {
          closeMenu();
          navToggle.focus();
        }
      });

      // Close when a nav link is clicked on mobile
      headerCollapse.querySelectorAll('a').forEach(function(link) {
        link.addEventListener('click', function() {
          if (window.matchMedia('(max-width: 720px)').matches) {
            closeMenu();
          }
        });
      });
    }
  });
</script>
