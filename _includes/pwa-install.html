<div id="pwa-install-banner" role="complementary" aria-label="Install DailyPick app" aria-hidden="true">
  <img class="pwa-banner__icon" src="/assets/favicon/android-chrome-192x192.png" alt="DailyPick" width="48" height="48">
  <div class="pwa-banner__text">
    <p class="pwa-banner__title">Install DailyPick</p>
    <p class="pwa-banner__subtitle" id="pwa-banner-subtitle">Add to your home screen for quick access</p>
  </div>
  <div class="pwa-banner__actions">
    <button class="pwa-btn-install" id="pwa-btn-install" hidden>Install</button>
    <button class="pwa-btn-dismiss" id="pwa-btn-dismiss" aria-label="Dismiss install prompt">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M14 4L4 14M4 4l10 10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
</div>
